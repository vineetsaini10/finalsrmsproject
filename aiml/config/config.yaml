project:
  name: "EcoIntellect AI Backend"
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8000
  reload: true

model_paths:
  waste_classifier: "models/waste_classifier/model.pth"
  hotspot_model: "models/hotspot_model/dbscan_model.pkl"
  prediction_model: "models/prediction_model/prophet_model.pkl"

data_paths:
  raw: "data/raw/"
  processed: "data/processed/"

classifier:
  image_size: [224, 224]
  classes: ["wet", "dry", "plastic", "hazardous"]
  norm_mean: [0.485, 0.456, 0.406]
  norm_std: [0.229, 0.224, 0.225]
  confidence_threshold: 0.60
  model_architecture: "mobilenet_v2"

hotspot:
  eps: 0.005 # ~500 meters
  min_samples: 5
  metric: "haversine"

prediction:
  history_days: 90
  forecast_days: 30
